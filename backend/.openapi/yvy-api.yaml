openapi: "3.1.0"
info:
  title: Yvy Capital API
  version: "1.0.0"
  description: |
    Yvy Capital Asset Management — internal API.
    All financial data is denominated in BRL unless stated otherwise.
    PII (CPF, CNPJ, email) is never returned in logs or error messages.
  contact:
    name: Yvy Capital Engineering
    email: leonardo.martins@yvy.capital

servers:
  - url: https://localhost:7007
    description: Local development (HTTPS)
  - url: http://localhost:5224
    description: Local development (HTTP)

tags:
  - name: Funds
    description: Fundo management operations
  - name: Webhooks
    description: Inbound integration callbacks (public, secret-protected)

# Every operation requires a valid Entra ID access token by default.
# Public exceptions (e.g. the Graph email webhook) override with `security: []` per operation.
security:
  - entraId: []

paths:
  # ════════════════════════════════ Funds ════════════════════════════════
  /api/v1/funds:
    get:
      operationId: ListFunds
      tags: [Funds]
      summary: List all funds
      description: Requires authentication (any assigned role — Viewer or above).
      responses:
        "200":
          description: List of funds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FundResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: CreateFund
      tags: [Funds]
      summary: Create a new fund
      description: Requires the **Operator** or **Admin** role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFundRequest"
            examples:
              fii_example:
                summary: Create a FII fund
                value:
                  code: "YVYQ11"
                  name: "Yvy Fundo de Infraestrutura"
                  fundType: "FII"
                  minimumInvestmentAmount: 5000.00
                  minimumInvestmentCurrency: "BRL"
      responses:
        "201":
          description: Fund created successfully
          content:
            application/json:
              schema:
                type: string
                format: uuid
                description: ID of the created fund
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/funds/{id}:
    get:
      operationId: GetFundById
      tags: [Funds]
      summary: Get fund by ID
      description: Requires authentication (any assigned role — Viewer or above).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fund found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ════════════════════════════════ Webhooks ════════════════════════════════
  /api/v1/webhooks/graph/email:
    post:
      operationId: GraphEmailWebhook
      tags: [Webhooks]
      summary: Receive Microsoft Graph email change notifications
      description: |
        Public endpoint Microsoft Graph posts mailbox change notifications to. **Anonymous** (Graph is
        unauthenticated to us) but protected by a `clientState` shared secret validated on every item.

        Two behaviours share the route:
        - **Validation handshake:** when called with `?validationToken=<token>`, echoes the token as
          `text/plain` with **200** (used once when a subscription is created).
        - **Notifications:** validates `clientState`, persists one durable queue row per new
          `MessageId` (deduplicated), and returns **202** immediately. No Graph calls happen here —
          message bodies are fetched later by a background job.
      security: []
      parameters:
        - name: validationToken
          in: query
          required: false
          description: Present only during the subscription validation handshake; echoed back verbatim.
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphNotificationBatch"
      responses:
        "202":
          description: Notifications accepted and queued for processing
        "200":
          description: Validation handshake — echoes the validationToken as text/plain
          content:
            text/plain:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Rejected — one or more items carried an invalid clientState

components:
  schemas:
    # ── Funds ──
    FundResponse:
      type: object
      required:
        - id
        - code
        - name
        - type
        - status
        - minimumInvestmentAmount
        - minimumInvestmentCurrency
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          pattern: "^[A-Z]{4,6}\\d{2}$"
          example: "YVYQ11"
        name:
          type: string
          maxLength: 200
          example: "Yvy Fundo de Infraestrutura"
        type:
          type: string
          enum: [FII, FIC, FIM, FIA]
        status:
          type: string
          enum: [Draft, Active, Suspended, Liquidated]
        minimumInvestmentAmount:
          type: number
          format: decimal
          minimum: 0
          example: 5000.00
        minimumInvestmentCurrency:
          type: string
          minLength: 3
          maxLength: 3
          example: "BRL"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    CreateFundRequest:
      type: object
      required:
        - code
        - name
        - fundType
        - minimumInvestmentAmount
      properties:
        code:
          type: string
          pattern: "^[A-Za-z]{4,6}\\d{2}$"
          example: "YVYQ11"
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: "Yvy Fundo de Infraestrutura"
        fundType:
          type: string
          enum: [FII, FIC, FIM, FIA]
        minimumInvestmentAmount:
          type: number
          format: decimal
          minimum: 0
          example: 5000.00
        minimumInvestmentCurrency:
          type: string
          minLength: 3
          maxLength: 3
          default: "BRL"
          example: "BRL"

    # ── Webhooks ──
    GraphNotificationBatch:
      type: object
      description: Lean (id-only) Microsoft Graph change-notification batch.
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/GraphNotificationItem"

    GraphNotificationItem:
      type: object
      properties:
        subscriptionId:
          type: string
        clientState:
          type: string
          description: Shared secret; must equal the configured value or the whole batch is rejected.
        changeType:
          type: string
          example: created
        resource:
          type: string
        resourceData:
          type: object
          properties:
            id:
              type: string
              description: The Graph message id — the dedup/idempotency key.

    # ── Shared ──
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

  responses:
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Forbidden:
      description: Authenticated, but the token lacks the required role
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Conflict:
      description: Conflict — resource already exists
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    UnprocessableEntity:
      description: Validation errors
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    InternalServerError:
      description: Unexpected server error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  # ════════════════════════════════ Security ════════════════════════════════
  securitySchemes:
    entraId:
      type: openIdConnect
      description: >-
        Microsoft Entra ID (Azure AD) via OIDC. Send the user's **access token** (not the id_token)
        as `Authorization: Bearer <token>`. The token's audience must be the Yvy.Intranet.Api app
        (`api://<api-client-id>`), and it carries a `roles` claim drawn from
        { Approver, Operator, Viewer, Admin }. Replace `<tenant-id>` per environment — real tenant
        values are never committed (kept in appsettings placeholders / user-secrets).
      openIdConnectUrl: https://login.microsoftonline.com/<tenant-id>/v2.0/.well-known/openid-configuration
